# ============================================================================
# TokenOps — Multi-Provider Model Routing Configuration
# ============================================================================
# Central routing configuration for distributing LLM requests across multiple
# providers based on task type, complexity, user tier, cost targets, and
# availability. The LLM gateway reads this file to:
#
#   1. Select the optimal model for each request based on routing rules.
#   2. Enforce rate limits and circuit breakers per provider.
#   3. Fail over to secondary providers when primaries are degraded.
#   4. Track per-request cost attribution for FinOps reporting.
#
# Deployment:
#   • Place in your gateway config directory (e.g., /etc/tokenops/routing.yaml)
#   • The gateway reloads on SIGHUP or via a configurable polling interval.
#   • Secrets (API keys) are resolved from environment variables at runtime.
#
# Last updated: 2026-05-27
# ============================================================================

schema_version: "1.0.0"

# ---------------------------------------------------------------------------
# 1. Provider Definitions
# ---------------------------------------------------------------------------
# Each provider block contains connection, authentication, rate-limit, and
# health-check settings. The gateway maintains a connection pool per provider.
# ---------------------------------------------------------------------------
providers:

  openai:
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    auth:
      type: bearer_token
      env_var: OPENAI_API_KEY                   # Resolved at runtime
    rate_limits:
      requests_per_minute: 5000
      tokens_per_minute: 2_000_000
      requests_per_day: 500_000
    timeout:
      connect_ms: 3000
      read_ms: 120_000                          # 2 min for long completions
      write_ms: 10_000
    retry:
      max_retries: 3
      backoff_base_ms: 500
      backoff_max_ms: 8000
      retryable_status_codes: [429, 500, 502, 503]
    health_check:
      enabled: true
      endpoint: "/models"
      interval_seconds: 30
      timeout_ms: 5000
    connection_pool:
      max_connections: 200
      idle_timeout_seconds: 60
    priority: 1                                 # Lower = higher priority
    enabled: true

  anthropic:
    display_name: "Anthropic"
    base_url: "https://api.anthropic.com/v1"
    auth:
      type: api_key_header
      header_name: "x-api-key"
      env_var: ANTHROPIC_API_KEY
    rate_limits:
      requests_per_minute: 4000
      tokens_per_minute: 1_600_000
      requests_per_day: 400_000
    timeout:
      connect_ms: 3000
      read_ms: 120_000
      write_ms: 10_000
    retry:
      max_retries: 3
      backoff_base_ms: 500
      backoff_max_ms: 8000
      retryable_status_codes: [429, 500, 502, 503, 529]
    health_check:
      enabled: true
      endpoint: "/messages"                     # HEAD request for liveness
      method: HEAD
      interval_seconds: 30
      timeout_ms: 5000
    connection_pool:
      max_connections: 150
      idle_timeout_seconds: 60
    priority: 2
    enabled: true

  google:
    display_name: "Google AI (Gemini)"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    auth:
      type: bearer_token
      env_var: GOOGLE_AI_API_KEY
    rate_limits:
      requests_per_minute: 3000
      tokens_per_minute: 4_000_000              # Gemini has generous TPM
      requests_per_day: 300_000
    timeout:
      connect_ms: 3000
      read_ms: 180_000                          # 3 min for Gemini long-context
      write_ms: 10_000
    retry:
      max_retries: 2
      backoff_base_ms: 1000
      backoff_max_ms: 10_000
      retryable_status_codes: [429, 500, 503]
    health_check:
      enabled: true
      endpoint: "/models"
      interval_seconds: 45
      timeout_ms: 5000
    connection_pool:
      max_connections: 100
      idle_timeout_seconds: 90
    priority: 3
    enabled: true

  meta_llama:
    display_name: "Meta Llama (via Together AI)"
    base_url: "https://api.together.xyz/v1"
    auth:
      type: bearer_token
      env_var: TOGETHER_API_KEY
    rate_limits:
      requests_per_minute: 6000
      tokens_per_minute: 3_000_000
      requests_per_day: 600_000
    timeout:
      connect_ms: 3000
      read_ms: 90_000
      write_ms: 10_000
    retry:
      max_retries: 3
      backoff_base_ms: 500
      backoff_max_ms: 8000
      retryable_status_codes: [429, 500, 502, 503]
    health_check:
      enabled: true
      endpoint: "/models"
      interval_seconds: 30
      timeout_ms: 5000
    connection_pool:
      max_connections: 150
      idle_timeout_seconds: 60
    priority: 4
    enabled: true

