# ---------------------------------------------------------------------------
# 3. Routing Rules
# ---------------------------------------------------------------------------
# Rules are evaluated top-to-bottom; the first matching rule wins. Each rule
# specifies a condition and a list of candidate models (in priority order).
# The router selects the first available candidate that passes circuit-breaker
# and rate-limit checks.
# ---------------------------------------------------------------------------
routing_rules:

  # ---- 3a. Task-Based Routing ----
  # Route requests by their declared task type (set via x-tokenops-task header
  # or the `task_type` field in the request metadata).

  task_based:

    - name: "Classification → Economy"
      description: "Simple classification tasks use cheapest models"
      condition:
        task_type: classification
      candidates:
        - gpt-4.1-nano                          # $0.10 / 1M input
        - gemini-2.5-flash                      # $0.15 / 1M input
        - llama-4-scout                         # $0.10 / 1M input
      max_cost_per_request: 0.001               # Hard ceiling: $0.001

    - name: "Extraction → Balanced"
      description: "Entity extraction needs decent accuracy at moderate cost"
      condition:
        task_type: extraction
      candidates:
        - gpt-4.1-mini
        - llama-4-maverick
        - gemini-2.5-flash
      max_cost_per_request: 0.01

    - name: "Summarization → Balanced"
      description: "Summarization works well with mid-tier models"
      condition:
        task_type: summarization
      candidates:
        - gemini-2.5-flash
        - gpt-4.1-mini
        - claude-haiku-3.5
      max_cost_per_request: 0.02

    - name: "Reasoning → Frontier"
      description: "Complex reasoning tasks need the best models"
      condition:
        task_type: reasoning
      candidates:
        - o4-mini
        - gemini-2.5-pro
        - claude-sonnet-4
        - gpt-4.1
      max_cost_per_request: 0.50

    - name: "Code Generation → Frontier"
      description: "Code gen routes to highest-rated code models"
      condition:
        task_type: code_generation
      candidates:
        - claude-sonnet-4                       # 9.6 code rating
        - gpt-4.1                               # 9.5 code rating
        - gemini-2.5-pro
      max_cost_per_request: 0.30

    - name: "Creative Writing → Frontier"
      description: "Creative work benefits from top-tier models"
      condition:
        task_type: creative_writing
      candidates:
        - claude-sonnet-4
        - gpt-4.1
        - gemini-2.5-pro
      max_cost_per_request: 0.20

  # ---- 3b. Complexity-Based Routing ----
  # The gateway estimates complexity from input token count + task type, or
  # the caller sets `x-tokenops-complexity` explicitly.

  complexity_based:

    - name: "Simple requests"
      description: "< 500 input tokens, straightforward tasks"
      condition:
        complexity: simple
        max_input_tokens: 500
      candidates:
        - gpt-4.1-nano
        - gemini-2.5-flash
        - llama-4-scout
      max_cost_per_request: 0.002

    - name: "Medium requests"
      description: "500-4000 input tokens, moderate context needed"
      condition:
        complexity: medium
        max_input_tokens: 4000
      candidates:
        - gpt-4.1-mini
        - gemini-2.5-flash
        - llama-4-maverick
        - claude-haiku-3.5
      max_cost_per_request: 0.02

    - name: "Complex requests"
      description: "> 4000 input tokens, deep reasoning required"
      condition:
        complexity: complex
        min_input_tokens: 4000
      candidates:
        - gemini-2.5-pro                        # Best for long-context
        - gpt-4.1
        - claude-sonnet-4
        - o4-mini
      max_cost_per_request: 1.00

  # ---- 3c. User-Tier Routing ----
  # Different user tiers get access to different model classes. Tier is
  # resolved from the API key or JWT claims.

  user_tier:

    - name: "Free tier"
      description: "Free users get economy models only"
      condition:
        user_tier: free
      candidates:
        - gpt-4.1-nano
        - gemini-2.5-flash
        - llama-4-scout
      rate_limit_override:
        requests_per_minute: 10
        tokens_per_minute: 50_000
      max_cost_per_request: 0.001

    - name: "Pro tier"
      description: "Pro users get balanced + economy models"
      condition:
        user_tier: pro
      candidates:
        - gpt-4.1-mini
        - gemini-2.5-flash
        - llama-4-maverick
        - claude-haiku-3.5
      rate_limit_override:
        requests_per_minute: 60
        tokens_per_minute: 500_000
      max_cost_per_request: 0.05

    - name: "Enterprise tier"
      description: "Enterprise users can access all models including frontier"
      condition:
        user_tier: enterprise
      candidates:
        - gpt-4.1
        - claude-sonnet-4
        - gemini-2.5-pro
        - o4-mini
        - gpt-4.1-mini                          # Fallback to balanced
      rate_limit_override:
        requests_per_minute: 500
        tokens_per_minute: 2_000_000
      max_cost_per_request: 2.00

  # ---- 3d. Fallback Chains ----
  # If all candidates in the matched rule are unavailable (circuit open,
  # rate-limited, or erroring), use these global fallback chains.

  fallback_chains:
    frontier:
      description: "Fallback order for frontier-tier requests"
      chain:
        - gpt-4.1
        - claude-sonnet-4
        - gemini-2.5-pro
        - gpt-4.1-mini                          # Last resort: downgrade tier
      on_exhausted: reject_with_retry_after      # 503 + Retry-After header

    balanced:
      description: "Fallback order for balanced-tier requests"
      chain:
        - gpt-4.1-mini
        - llama-4-maverick
        - gemini-2.5-flash
        - claude-haiku-3.5
      on_exhausted: reject_with_retry_after

    economy:
      description: "Fallback order for economy-tier requests"
      chain:
        - gpt-4.1-nano
        - gemini-2.5-flash
        - llama-4-scout
      on_exhausted: queue_for_retry              # Enqueue for delayed retry

# ---------------------------------------------------------------------------
# 4. Circuit Breaker Settings
# ---------------------------------------------------------------------------
# Per-provider circuit breaker to stop sending traffic to degraded providers.
# Uses a sliding window to track error rates.
# ---------------------------------------------------------------------------
circuit_breaker:
  defaults:
    enabled: true
    # Window over which error rate is calculated
    window_size_seconds: 60
    # Minimum requests in window before circuit can trip
    min_requests_in_window: 20
    # Error rate threshold to open the circuit (0.0 - 1.0)
    error_rate_threshold: 0.50
    # How long the circuit stays open before trying a probe request
    open_duration_seconds: 30
    # Number of consecutive successes in half-open state to close circuit
    half_open_success_threshold: 3
    # Which HTTP status codes count as errors
    error_status_codes: [500, 502, 503, 429]
    # Whether timeouts count as errors
    count_timeouts_as_errors: true

  # Per-provider overrides
  overrides:
    openai:
      error_rate_threshold: 0.40                # Trip earlier for primary
      open_duration_seconds: 20                 # Recover faster
    anthropic:
      error_rate_threshold: 0.50
      open_duration_seconds: 30
    google:
      error_rate_threshold: 0.50
      open_duration_seconds: 45                 # Slower recovery; observe
    meta_llama:
      error_rate_threshold: 0.60                # More tolerant for OSS
      open_duration_seconds: 30

# ---------------------------------------------------------------------------
# 5. Load Balancing
# ---------------------------------------------------------------------------
# When multiple candidates in a rule are healthy, the load balancer selects
# among them. Strategy applies within a single routing rule's candidate list.
# ---------------------------------------------------------------------------
load_balancing:
  # Strategy: round_robin | weighted | least_latency | cost_optimized
  strategy: cost_optimized

  cost_optimized:
    description: >
      Selects the cheapest healthy model that meets the quality threshold
      for the detected task type. Falls back to least-latency if costs are
      equal.
    # Minimum quality rating (1-10) a model must have for the detected
    # task type to be eligible. Prevents routing reasoning tasks to nano.
    min_quality_rating: 7.0
    # When multiple models have identical cost, break ties by latency
    tiebreaker: least_latency

  weighted:
    description: "Manual traffic split for A/B testing or gradual migration"
    weights:
      gpt-4.1-mini: 60
      gemini-2.5-flash: 25
      llama-4-maverick: 15

  least_latency:
    description: "Route to the provider with the lowest P50 latency"
    # Latency is measured via a sliding window of recent requests
    latency_window_seconds: 300
    # Minimum sample size before latency data is trusted
    min_samples: 50

# ---------------------------------------------------------------------------
# 6. Cost Tracking Hooks
# ---------------------------------------------------------------------------
# After every request, the gateway emits a cost event for downstream
# analytics pipelines. These hooks define where and how cost data flows.
# ---------------------------------------------------------------------------
cost_tracking:
  enabled: true

  # Fields appended to every cost event (in addition to standard metadata
  # like request_id, model, provider, input/output tokens, cost, latency)
  enrichment_fields:
    - source: request_header
      header: "x-tokenops-service"
      event_field: service
    - source: request_header
      header: "x-tokenops-feature"
      event_field: feature
    - source: request_header
      header: "x-tokenops-environment"
      event_field: environment
    - source: request_header
      header: "x-tokenops-cost-center"
      event_field: cost_center
    - source: request_header
      header: "x-tokenops-user-tier"
      event_field: user_tier
    - source: routing_metadata
      field: "routing_rule_name"
      event_field: routing_rule
    - source: routing_metadata
      field: "fallback_used"
      event_field: is_fallback

  # Destinations for cost events
  sinks:
    - type: webhook
      url: "https://analytics.company.com/tokenops/events"
      method: POST
      headers:
        Authorization: "Bearer {{ TOKENOPS_ANALYTICS_TOKEN }}"
        Content-Type: "application/json"
      batch_size: 100                           # Buffer up to 100 events
      flush_interval_seconds: 5                 # Flush at least every 5s
      retry_on_failure: true

    - type: kafka
      bootstrap_servers: "kafka.company.com:9092"
      topic: "tokenops.cost.events"
      compression: gzip
      acks: 1                                   # Leader ack only (fast)

    - type: stdout
      format: json                              # For local development
      enabled_environments: [development, staging]

  # Real-time cost aggregation (powers budget guardrails)
  aggregation:
    # In-memory sliding window for real-time budget checks
    window_duration_minutes: 60
    # How often aggregated totals are flushed to persistent storage
    persist_interval_seconds: 30
    # Storage backend for persistent aggregation
    storage:
      type: redis
      url: "redis://redis.company.com:6379/2"
      key_prefix: "tokenops:cost:"
      ttl_hours: 2160                           # 90 days retention

# ---------------------------------------------------------------------------
# 7. Global Settings
# ---------------------------------------------------------------------------
global:
  # Default model when no routing rule matches (should rarely happen)
  default_model: gpt-4.1-mini

  # Maximum request body size (prevents abuse)
  max_request_body_bytes: 10_485_760            # 10 MB

  # Request ID header name (for tracing)
  request_id_header: "x-tokenops-request-id"

  # If true, the router adds x-tokenops-routed-model and
  # x-tokenops-routed-reason headers to the response
  expose_routing_headers: true

  # Logging level for the routing engine
  log_level: info                               # debug | info | warn | error

  # Environment label
  environment: production
